name: Build luci-theme-alpha APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Makefile'
      - 'css/**'
      - 'html/**'
      - 'js/**'

jobs:
  build:
    name: Build OpenWrt APK
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: luci-theme-4lpha

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache ecj fastjar file g++ gawk \
            gettext git java-propose-classpath libncurses5-dev libssl-dev python3 \
            python3-distutils unzip wget zlib1g-dev python3-setuptools python3-pip \
            rsync zstd jq

      - name: Download OpenWrt Snapshot SDK (x86_64)
        run: |
          SDK_URL="https://downloads.openwrt.org/snapshots/targets/x86/64"
          SDK_FILE=$(curl -s "$SDK_URL/sha256sums" | grep 'openwrt-sdk' | grep '\.tar\.zst' | awk '{print $2}' | sed 's/^\*//')
          wget "$SDK_URL/$SDK_FILE"
          tar -I zstd -xf "$SDK_FILE"
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*")
          mv "$SDK_DIR" openwrt-sdk

      - name: Copy Theme to SDK
        run: |
          mkdir -p openwrt-sdk/package/custom
          cp -r luci-theme-4lpha openwrt-sdk/package/custom/

      - name: Ensure APK Generation
        run: |
          cd openwrt-sdk
          echo "CONFIG_PACKAGE_MANAGER_APK=y" >> .config

      - name: Build APK Package
        run: |
          cd openwrt-sdk
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/custom/luci-theme-4lpha/compile V=99

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: luci-theme-4lpha-apk
          path: openwrt-sdk/bin/packages/**/*.apk
          if-no-files-found: error
